name: Forge verification

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest
      - name: Run test suite
        run: python -m pytest -q
      - name: Run golden-corpus precision gate
        run: python -m forge.precision --corpus tests/corpus --output precision-baseline.json --min-f1 1.0
